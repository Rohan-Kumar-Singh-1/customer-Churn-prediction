name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # ✅ FIXED PATH
    - name: Install dependencies
      run: |
        pip install -r api/requirements.txt

    # ✅ FIXED PYTHONPATH (important for imports)
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=." >> $GITHUB_ENV

    # ✅ Run tests
    - name: Run tests
      run: pytest